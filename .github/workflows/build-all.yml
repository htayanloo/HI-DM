name: Build HI-DM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

      # Create MSI with WiX
      - name: Install WiX Toolset
        run: dotnet tool install --global wix
      - name: Create MSI
        run: |
          wix build packaging/windows/HI-DM.wxs -o HI-DM-Setup.msi
        shell: cmd

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/windows/x64/runner/Release/
            HI-DM-Setup.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release

      # Create DMG
      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -R "build/macos/Build/Products/Release/HI-DM.app" "dmg_content/HI-DM.app"
          ln -s /Applications dmg_content/Applications
          hdiutil create -volname "HI-DM" -srcfolder dmg_content -ov -format UDZO "HI-DM.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: HI-DM.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev rpm libayatana-appindicator3-dev
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release

      # Create DEB package
      - name: Build DEB
        run: |
          mkdir -p packaging/deb/hi-dm/DEBIAN
          mkdir -p packaging/deb/hi-dm/usr/bin
          mkdir -p packaging/deb/hi-dm/usr/lib/hi-dm
          mkdir -p packaging/deb/hi-dm/usr/share/applications
          mkdir -p packaging/deb/hi-dm/usr/share/icons/hicolor/256x256/apps

          cp -r build/linux/x64/release/bundle/* packaging/deb/hi-dm/usr/lib/hi-dm/

          cat > packaging/deb/hi-dm/usr/bin/hi-dm << 'SCRIPT'
          #!/bin/bash
          exec /usr/lib/hi-dm/flutter_dm "$@"
          SCRIPT
          chmod +x packaging/deb/hi-dm/usr/bin/hi-dm

          cat > packaging/deb/hi-dm/DEBIAN/control << 'CTRL'
          Package: hi-dm
          Version: 1.0.0
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libsqlite3-0
          Maintainer: HI-DM Team <hi-dm@example.com>
          Description: HI-DM - Internet Download Manager
           A full-featured download manager with multi-threaded downloading,
           resume capability, queue management, and site grabber.
          CTRL

          cat > packaging/deb/hi-dm/usr/share/applications/hi-dm.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=HI-DM
          Comment=Internet Download Manager
          Exec=hi-dm
          Icon=hi-dm
          Categories=Network;FileTransfer;
          Keywords=download;manager;
          DESKTOP

          dpkg-deb --build packaging/deb/hi-dm hi-dm_1.0.0_amd64.deb

      # Create RPM package
      - name: Build RPM
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create tarball
          mkdir -p /tmp/hi-dm-1.0.0/usr/lib/hi-dm
          mkdir -p /tmp/hi-dm-1.0.0/usr/bin
          mkdir -p /tmp/hi-dm-1.0.0/usr/share/applications
          cp -r build/linux/x64/release/bundle/* /tmp/hi-dm-1.0.0/usr/lib/hi-dm/
          cp packaging/deb/hi-dm/usr/bin/hi-dm /tmp/hi-dm-1.0.0/usr/bin/
          cp packaging/deb/hi-dm/usr/share/applications/hi-dm.desktop /tmp/hi-dm-1.0.0/usr/share/applications/

          tar czf ~/rpmbuild/SOURCES/hi-dm-1.0.0.tar.gz -C /tmp hi-dm-1.0.0
          cp packaging/rpm/hi-dm.spec ~/rpmbuild/SPECS/
          rpmbuild -bb ~/rpmbuild/SPECS/hi-dm.spec
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ./hi-dm-1.0.0.x86_64.rpm || true

      # Create AppImage
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/lib/
          cp packaging/deb/hi-dm/usr/bin/hi-dm AppDir/usr/bin/
          ln -sf usr/bin/hi-dm AppDir/AppRun
          cp packaging/deb/hi-dm/usr/share/applications/hi-dm.desktop AppDir/

          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir HI-DM-x86_64.AppImage || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            hi-dm_1.0.0_amd64.deb
            hi-dm-1.0.0.x86_64.rpm
            HI-DM-x86_64.AppImage

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HI-DM ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            windows-build/HI-DM-Setup.msi
            macos-build/HI-DM.dmg
            linux-build/hi-dm_1.0.0_amd64.deb
            linux-build/hi-dm-1.0.0.x86_64.rpm
            linux-build/HI-DM-x86_64.AppImage
