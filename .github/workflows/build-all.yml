name: Build HI-DM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release

      - name: Create ZIP archive
        run: |
          cd build/windows/x64/runner/Release
          7z a -tzip ../../../../../HI-DM-Windows.zip *
        shell: cmd

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: HI-DM-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release

      - name: Create DMG
        run: |
          mkdir -p dmg_content
          cp -R "build/macos/Build/Products/Release/HI-DM.app" "dmg_content/HI-DM.app"
          ln -s /Applications dmg_content/Applications
          hdiutil create -volname "HI-DM" -srcfolder dmg_content -ov -format UDZO "HI-DM.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: HI-DM.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev rpm libayatana-appindicator3-dev
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release

      - name: Build DEB
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/hi-dm
          mkdir -p pkg/usr/share/applications
          mkdir -p pkg/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* pkg/usr/lib/hi-dm/
          cp assets/icons/hi-dm-logo.png pkg/usr/share/icons/hicolor/256x256/apps/hi-dm.png || true
          printf '#!/bin/bash\nexec /usr/lib/hi-dm/flutter_dm "$@"\n' > pkg/usr/bin/hi-dm
          chmod +x pkg/usr/bin/hi-dm
          cat > pkg/DEBIAN/control << EOF
          Package: hi-dm
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libsqlite3-0
          Maintainer: HI-DM <hi-dm@example.com>
          Description: HI-DM - Internet Download Manager
           Multi-threaded download manager with resume, queues, and site grabber.
          EOF
          sed -i 's/^          //' pkg/DEBIAN/control
          cat > pkg/usr/share/applications/hi-dm.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=HI-DM
          Comment=Internet Download Manager
          Exec=hi-dm
          Icon=hi-dm
          Categories=Network;FileTransfer;
          Keywords=download;manager;
          EOF
          sed -i 's/^          //' pkg/usr/share/applications/hi-dm.desktop
          dpkg-deb --build pkg "hi-dm_${VERSION}_amd64.deb"

      - name: Build RPM
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p /tmp/hi-dm-${VERSION}/usr/lib/hi-dm
          mkdir -p /tmp/hi-dm-${VERSION}/usr/bin
          mkdir -p /tmp/hi-dm-${VERSION}/usr/share/applications
          cp -r build/linux/x64/release/bundle/* /tmp/hi-dm-${VERSION}/usr/lib/hi-dm/
          cp pkg/usr/bin/hi-dm /tmp/hi-dm-${VERSION}/usr/bin/
          cp pkg/usr/share/applications/hi-dm.desktop /tmp/hi-dm-${VERSION}/usr/share/applications/
          tar czf ~/rpmbuild/SOURCES/hi-dm-${VERSION}.tar.gz -C /tmp hi-dm-${VERSION}
          cp packaging/rpm/hi-dm.spec ~/rpmbuild/SPECS/
          sed -i "s/^Version:.*/Version:        ${VERSION}/" ~/rpmbuild/SPECS/hi-dm.spec
          rpmbuild -bb ~/rpmbuild/SPECS/hi-dm.spec || true
          cp ~/rpmbuild/RPMS/x86_64/*.rpm ./hi-dm-${VERSION}.x86_64.rpm || true

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/lib/
          cp pkg/usr/bin/hi-dm AppDir/usr/bin/
          cp pkg/usr/share/applications/hi-dm.desktop AppDir/hi-dm.desktop
          cp assets/icons/hi-dm-logo.png AppDir/hi-dm.png || true
          cp assets/icons/hi-dm-logo.png AppDir/usr/share/icons/hicolor/256x256/apps/hi-dm.png || true
          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexec "$HERE/usr/lib/flutter_dm" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir HI-DM-x86_64.AppImage || true

      - name: Build tar.gz bundle
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          tar czf "HI-DM-${VERSION}-linux-x64.tar.gz" -C build/linux/x64/release/bundle .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            hi-dm_*_amd64.deb
            hi-dm-*.x86_64.rpm
            HI-DM-x86_64.AppImage
            HI-DM-*-linux-x64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f | head -30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: HI-DM ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            windows-build/HI-DM-Windows.zip
            macos-build/HI-DM.dmg
            linux-build/hi-dm_*_amd64.deb
            linux-build/hi-dm-*.x86_64.rpm
            linux-build/HI-DM-x86_64.AppImage
            linux-build/HI-DM-*-linux-x64.tar.gz
