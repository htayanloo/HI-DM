name: flutter_dm
description: "HI-DM - A full-featured Internet Download Manager clone built with Flutter"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28

  # HTTP
  dio: ^5.7.0

  # UI
  flex_color_scheme: ^8.1.1
  fl_chart: ^0.70.2
  cupertino_icons: ^1.0.8

  # Desktop
  window_manager: ^0.4.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  path: ^1.9.1
  intl: ^0.20.2
  collection: ^1.19.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  tray_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.23.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/l10n/
