app-id: com.hidm.HiDM
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: hi-dm
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-download

modules:
  - name: hi-dm
    buildsystem: simple
    build-commands:
      - install -Dm755 -t /app/bin/ hi-dm
      - cp -r lib /app/
      - install -Dm644 hi-dm.desktop /app/share/applications/com.hidm.HiDM.desktop
    sources:
      - type: archive
        url: https://github.com/htayanloo/Hi-DM/releases/latest/download/hi-dm-linux-bundle.tar.gz
        sha256: FIXME
